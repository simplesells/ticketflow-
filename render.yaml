services:
  - type: web
    name: ticketflow
    runtime: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && npm run build
    startCommand: cd backend && node dist/main.js
    envVars:
      - key: TURSO_URL
        value: libsql://ticketflow-simplesells.aws-ap-northeast-1.turso.io
      - key: TURSO_TOKEN
        value: YOUR_TURSO_TOKEN_HERE
